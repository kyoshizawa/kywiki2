syntax = "proto3";

package fexics.cardnet.v1;

option csharp_namespace = "Fexics.Cardnet.V1";

import "google/protobuf/timestamp.proto";

// CARDNET 通信サービス
// AP22 (CardnetService) → Routing Engine → Gateway Service (CARDNET接続)
// 待ち受けポート: 5000
//
// Note: CARDNET が対応する金種は IC のみ（iD・磁気は対象外）
service CardnetService {

  // ---- 制御電文 ----

  // SignOn: 開局（接続確立）※ CAFIS C01 相当
  rpc SignOn(SignOnRequest) returns (SignOnResponse);

  // SignOff: 閉局（接続切断）※ CAFIS C02 相当
  rpc SignOff(SignOffRequest) returns (SignOffResponse);

  // GetStatus: ステータス取得（ヘルスチェックにも使用）※ CAFIS C03 相当
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // CutOver: 日次更新（カット日付更新）※ CAFIS C12 相当
  rpc CutOver(CutOverRequest) returns (CutOverResponse);

  // Echo: 死活確認（ハートビート）※ CARDNET 固有、CAFIS に相当なし
  // 接続維持のため定期的に Gateway Service から CARDNET へ送信される。
  // AP22 / CLI からも手動実行可能。
  rpc Echo(EchoRequest) returns (EchoResponse);

  // ---- 業務電文 ----

  // OnlineAuthICC: IC オンラインオーソリ ※ CAFIS B22 相当
  rpc OnlineAuthICC(OnlineAuthICCRequest) returns (OnlineAuthICCResponse);

  // OnlineAuthICCCancel: IC オーソリ取消 ※ CAFIS B23 相当
  rpc OnlineAuthICCCancel(OnlineAuthICCCancelRequest) returns (OnlineAuthICCCancelResponse);

  // SystemCancel: 障害取消 ※ CAFIS B25 相当
  // CAFIS と異なり、取消対象の特定には SystemTraceAuditNo を使用する。
  // 注意: 対象取引が処理された接続コードの回線で処理する必要があるため、
  //       connection_codes には当該取引の接続コード 1 件のみを指定すること。
  rpc SystemCancel(SystemCancelRequest) returns (SystemCancelResponse);
}

// ==========================================================================
// 共通
// ==========================================================================

// ルーティング情報（全リクエスト共通）
// Routing Engine が接続先 Gateway Service を選択するために使用する。
// 複数指定した場合、障害中の接続先を除外して接続を試みる。
// SystemCancel では対象取引の接続コード 1 件のみ指定すること。
message RoutingInfo {
  repeated string connection_codes = 1; // 接続コード一覧（例: "3M30809-0003"）
}

// オーソリ結果コード
// FEXICS DLL の AUTH_RESULT enum に対応
enum AuthResultCode {
  AUTH_RESULT_UNSPECIFIED = 0;
  AUTH_RESULT_ACCEPT      = 1; // 許可
  AUTH_RESULT_REJECT      = 2; // 拒否
  AUTH_RESULT_ERROR       = 3; // エラー（障害取消対象）
}

// ==========================================================================
// SignOn: 開局
// ==========================================================================

message SignOnRequest {
  RoutingInfo routing = 1;
}

message SignOnResponse {
  string error_code = 1; // エラーコード（正常時は空文字）
}

// ==========================================================================
// SignOff: 閉局
// ==========================================================================

message SignOffRequest {
  RoutingInfo routing = 1;
}

message SignOffResponse {
  string error_code = 1;
}

// ==========================================================================
// GetStatus: ステータス取得
// ==========================================================================

message GetStatusRequest {
  RoutingInfo routing = 1;
}

message GetStatusResponse {
  string error_code = 1;
  string status     = 2; // CARDNET 接続ステータス（FEXICS_STATUS 相当）
}

// ==========================================================================
// CutOver: 日次更新
// ==========================================================================

message CutOverRequest {
  RoutingInfo routing = 1;
}

message CutOverResponse {
  string error_code = 1;
  string cut_date   = 2; // 現在カット日付（YYYYMMDD 形式）
}

// ==========================================================================
// Echo: 死活確認（ハートビート）
// ==========================================================================

message EchoRequest {
  RoutingInfo routing = 1;
}

message EchoResponse {
  string error_code = 1;
  bool   alive      = 2; // 疎通確認結果（true: 正常）
}

// ==========================================================================
// OnlineAuthICC: IC オンラインオーソリ
//
// フィールド根拠: AP22 FexicsServiceRepository.OnlineAuthICC() 内で
// 組み立てる OnlineAuthICC_Request に対応
// ==========================================================================

message OnlineAuthICCRequest {
  RoutingInfo                routing              = 1;
  google.protobuf.Timestamp  auth_datetime        = 2;  // 処理日付
  string                     terminal_no          = 3;  // 端末番号
  int32                      terminal_proc_no     = 4;  // 端末処理通番
  string                     to_center_id         = 5;  // 仕向先センターID
  string                     merchant_contract_cd = 6;  // 加盟店契約コード
  string                     merchant_no          = 7;  // 加盟店番号（設定により送信）
  int32                      fare                 = 8;  // 金額
  string                     product_cd           = 9;  // 商品コード
  string                     pos_data_cd          = 10; // POSデータコード
  string                     merchant_type_cd     = 11; // 加盟店種別コード（MerchantTypeCd）
  string                     jis1_track2          = 12; // JIS1トラック2（磁気ストライプ情報）
  string                     terminal_no_part     = 13; // 端末番号パート
  bytes                      icc_data             = 14; // ICC関連データ
  string                     bit62_data           = 15; // BIT62データ（JCB/セゾン等のブランド拡張データ）
  bool                       is_manual            = 16; // 手動処理フラグ
}

// OnlineAuthICC レスポンス
// フィールド根拠: AP22 AuthResult クラスに対応
message OnlineAuthICCResponse {
  AuthResultCode  result                    = 1;  // オーソリ結果（ACCEPT / REJECT / ERROR）
  string          summary_date              = 2;  // 精査日
  optional uint32 system_trace_audit_no    = 3;  // システムトレースオーディットナンバー（障害取消で使用）
  string          retrieval_reference_number = 4; // リトリーバルリファレンスナンバー
  string          approval_no              = 5;  // 承認番号
  string          action_cd               = 6;  // アクションコード（例: "000"）
  string          response_cd             = 7;  // 国内レスポンスコード
  string          icc_data                = 8;  // ICC関連データ（応答・HEX文字列）
  string          decide_center_id        = 9;  // オーソリ判定センターID
  string          bit62_data              = 10; // BIT62データ（応答・ブランド拡張）
}

// ==========================================================================
// OnlineAuthICCCancel: IC オーソリ取消
//
// フィールド根拠: AP22 FexicsServiceRepository.OnlineAuthICCCancel() 内で
// 組み立てる OnlineAuthICC_Cancel_Request に対応
// ==========================================================================

message OnlineAuthICCCancelRequest {
  RoutingInfo                routing                      = 1;
  google.protobuf.Timestamp  auth_datetime                = 2;  // 取消取引の処理日付
  string                     terminal_no                  = 3;  // 端末番号
  int32                      terminal_proc_no             = 4;  // 取消取引の端末処理通番
  string                     to_center_id                 = 5;  // 仕向先センターID
  string                     merchant_contract_cd         = 6;  // 加盟店契約コード
  uint32                     target_system_trace_audit_no = 7;  // 取消対象のシステムトレースオーディットナンバー
  int32                      cancel_mode                  = 8;  // 取消モード（1: 取消固定）
  int32                      cancel_terminal_proc_no      = 9;  // 取消元の端末処理通番（取消元取引の TerminalProcNo）
}

// OnlineAuthICCCancel レスポンス
// フィールド構成は OnlineAuthICCResponse と共通
message OnlineAuthICCCancelResponse {
  AuthResultCode  result                    = 1;
  string          summary_date              = 2;
  optional uint32 system_trace_audit_no    = 3;  // 障害取消で使用
  string          retrieval_reference_number = 4;
  string          approval_no              = 5;
  string          action_cd               = 6;
  string          response_cd             = 7;
  string          icc_data                = 8;
  string          decide_center_id        = 9;
}

// ==========================================================================
// SystemCancel: 障害取消
//
// CAFIS の障害取消（B25）と異なり、CARDNET では SystemTraceAuditNo で
// 対象取引を特定する。ShoriDate / TerminalId は不要。
// ==========================================================================

message SystemCancelRequest {
  RoutingInfo    routing                = 1;
  uint32         system_trace_audit_no = 2; // 取消対象のシステムトレースオーディットナンバー
}

message SystemCancelResponse {
  string error_code = 1; // エラーコード（正常時は空文字）
}
